    app.kubernetes.io/name: "sandbox2-argo-cd"
    app.kubernetes.io/instance: "smartx"
    org.ulagbulag.io/cluster: "sandbox2"
    org.ulagbulag.io/group: "ops"
    org.ulagbulag.io/phase: "stable"
    org.ulagbulag.io/privileged: "false"
    org.ulagbulag.io/project: "sandbox2-ops"
    org.ulagbulag.io/scale: "small"
    org.ulagbulag.io/tower-cluster: "sandbox2"
    org.ulagbulag.io/tower-project: "sandbox2-ops"
spec:
  destination:
    name: "sandbox2"
    namespace: "argo"
  ignoreDifferences:
    - jsonPointers:
      - /data/oidc.openid_connect.name
      - /data/oidc.openid_connect.issuer
      - /data/oidc.openid_connect.clientID
      - /data/oidc.openid_connect.clientSecret
      - /data/server.secretkey
      - /data/webhook.github.secret
      kind: Secret
      name: argocd-secret
  project: "sandbox2-ops"
  sources:
    - repoURL: "https://argoproj.github.io/argo-helm"
      chart: "argo-cd"
      targetRevision: "9.3.7"
      helm:
        releaseName: "argo-cd"
        valuesObject:
          applicationSet:
            metrics:
              enabled: false
          configs:
            cm:
              resource.exclusions: |
                ### Network resources created by the Kubernetes control plane and excluded to reduce the number of watched events and UI clutter
                - apiGroups:
                  - ''
                  - discovery.k8s.io
                  kinds:
                  - Endpoints
                  - EndpointSlice
                ### Internal Kubernetes resources excluded reduce the number of watched events
                - apiGroups:
                  - coordination.k8s.io
                  kinds:
                  - Lease
                ### Internal Kubernetes Authz/Authn resources excluded reduce the number of watched events
                - apiGroups:
                  - authentication.k8s.io
                  - authorization.k8s.io
                  kinds:
                  - SelfSubjectReview
                  - TokenReview
                  - LocalSubjectAccessReview
                  - SelfSubjectAccessReview
                  - SelfSubjectRulesReview
                  - SubjectAccessReview
                ### Intermediate Certificate Request excluded reduce the number of watched events
                - apiGroups:
                  - certificates.k8s.io
                  kinds:
                  - CertificateSigningRequest
                - apiGroups:
                  - cert-manager.io
                  kinds:
                  - CertificateRequest
                ### Cilium internal resources excluded reduce the number of watched events and UI Clutter
                - apiGroups:
                  - cilium.io
                  kinds:
                  - CiliumIdentity
                  - CiliumEndpoint
                  - CiliumEndpointSlice
                ### Kyverno intermediate and reporting resources excluded reduce the number of watched events and improve performance
                - apiGroups:
                  - kyverno.io
                  - reports.kyverno.io
                  - wgpolicyk8s.io
                  kinds:
                  - PolicyReport
                  - ClusterPolicyReport
                  - EphemeralReport
                  - ClusterEphemeralReport
                  - AdmissionReport
                  - ClusterAdmissionReport
                  - BackgroundScanReport
                  - ClusterBackgroundScanReport
                  - UpdateRequest
            params:
              application.namespaces: ""
              resource.exclusions: |
                - apiGroups:
                    - cilium.io
                  kinds:
                    - CiliumIdentity
                  clusters:
                    - "*"
            rbac:
              policy.csv: |
                g, admin, role:admin
                g, sandbox2-admin, role:admin
                g, ops, role:admin
                g, sandbox2-ops, role:admin
                g, sandbox2, role:readonly
          controller:
            metrics:
              enabled: false
          global:
            addPrometheusAnnotations: false
            domain: cd.argo.sandbox2.sandbox2.local
            tolerations:
            - effect: NoExecute
              key: org.ulagbulag.io/bind
              operator: Exists
            - effect: NoExecute
              key: org.ulagbulag.io/bind.profile
              operator: Exists
            - effect: NoExecute
              key: org.ulagbulag.io/signed-out
              operator: Exists
          notifications:
            metrics:
              enabled: false
          redis:
            metrics:
              enabled: false
          repoServer:
            metrics:
              enabled: false
          server:
            ingress:
              annotations:
                cert-manager.io/cluster-issuer: sandbox2.sandbox2.local
              enabled: false
              ingressClassName: sandbox2.sandbox2.local
            metrics:
              enabled: false
        valueFiles:
          - "$origin/apps/argo-cd/values.yaml"
    - repoURL: "https://github.com/SJoon99/smartx-k8s.git"
      targetRevision: main
      ref: origin
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
      - ServerSideApply=true

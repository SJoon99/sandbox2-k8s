            ui:
              tolerations:
              - effect: NoExecute
                key: org.ulagbulag.io/bind
                operator: Exists
              - effect: NoExecute
                key: org.ulagbulag.io/bind.profile
                operator: Exists
              - effect: NoExecute
                key: org.ulagbulag.io/signed-out
